/* ============================================================
   実績ストリップ（カウントアップ）
   ============================================================ */
function Counter({ to, suffix="", prefix="" }) {
  const [v,setV] = useState(0);
  const ref = useRef(null);
  return (
    <motion.span ref={ref} onViewportEnter={()=>{
      const dur=1400, t0=performance.now();
      const tick=(t)=>{ const p=Math.min(1,(t-t0)/dur); setV(Math.round(to*(1-Math.pow(1-p,3)))); if(p<1) requestAnimationFrame(tick); };
      requestAnimationFrame(tick);
    }} viewport={{ once:true }}>
      {prefix}{v.toLocaleString()}{suffix}
    </motion.span>
  );
}
function StatBand() {
  const stats = [
    { to:120, suffix:"+", label:"制作実績" },
    { to:98,  suffix:"%", label:"継続率" },
    { to:7,   suffix:"日", label:"最短公開" },
    { to:29800, prefix:"¥", label:"月額サポート" },
  ];
  return (
    <section className="px-6 lg:px-10 -mt-6">
      <Reveal>
        <div className="max-w-6xl mx-auto rounded-3xl bg-white ring-1 ring-slate-100 shadow-[0_20px_60px_rgba(13,23,55,0.07)] grid grid-cols-2 lg:grid-cols-4 divide-y lg:divide-y-0 lg:divide-x divide-slate-100">
          {stats.map((s,i)=>(
            <div key={i} className="p-8 text-center">
              <div className="font-display text-3xl sm:text-4xl font-extrabold text-navy-800">
                <Counter to={s.to} suffix={s.suffix} prefix={s.prefix} />
              </div>
              <div className="mt-2 text-sm text-slate-500">{s.label}</div>
            </div>
          ))}
        </div>
      </Reveal>
    </section>
  );
}

  ];
  return (
    <section id="flow" className="py-24 lg:py-32">
      <div className="max-w-5xl mx-auto px-6 lg:px-10">
        <Reveal className="text-center"><Eyebrow>Process</Eyebrow></Reveal>
        <Reveal delay={0.05}><h2 className="font-display text-center mt-5 text-3xl sm:text-4xl font-extrabold text-navy-800">制作の流れ</h2></Reveal>
        <div className="mt-16 relative">
          <div className="absolute left-[27px] top-2 bottom-2 w-px bg-gradient-to-b from-brand-400 via-brand-300 to-slate-100 md:left-1/2"></div>
          <div className="space-y-3 md:space-y-0">
            {steps.map((s,i)=>(
              <Reveal key={i} delay={(i%2)*0.05}>
                <div className={`relative flex items-start gap-6 md:gap-0 md:grid md:grid-cols-2 md:items-center ${i%2?'md:[direction:rtl]':''}`}>
                  <div className={`md:[direction:ltr] ${i%2?'md:pl-14 md:text-left':'md:pr-14 md:text-right'} pl-16 md:pl-0`}>
                    <div className="rounded-2xl bg-white ring-1 ring-slate-100 shadow-[0_10px_40px_rgba(13,23,55,0.05)] p-6 inline-block w-full md:w-auto">
                      <div className="font-display text-lg font-bold text-navy-800">{s[0]}</div>
                      <div className="mt-1 text-sm text-slate-500">{s[1]}</div>
                    </div>
                  </div>
                  <div className="absolute left-0 md:left-1/2 md:-translate-x-1/2 top-5 md:top-1/2 md:-translate-y-1/2">
                    <div className="grid place-items-center h-14 w-14 rounded-full bg-gradient-to-br from-brand-500 to-brand-400 text-white font-display font-extrabold ring-4 ring-white shadow-lg shadow-brand-500/30">
                      {String(i+1).padStart(2,"0")}
                    </div>
                  </div>
                  <div className="hidden md:block"></div>
                </div>
              </Reveal>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}
